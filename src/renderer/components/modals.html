<!-- Add Task Modal -->
<div class="modal-overlay" id="modal-overlay" style="display: none">
  <div class="modal glass" id="modal-add-task">
    <div class="modal-header">
      <h2 id="modal-title">Add Task</h2>
      <button class="btn btn-ghost btn-sm" id="btn-modal-close">✕</button>
    </div>
    <form id="form-add-task">
      <div class="form-group">
        <label for="task-name">Task Name</label>
        <input type="text" id="task-name" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="task-date">Date</label>
          <input type="date" id="task-date" required />
        </div>
        <div class="form-group">
          <label for="task-time">Time</label>
          <input type="time" id="task-time" required />
        </div>
      </div>
      <div class="form-group">
        <label for="task-estimate">Estimated Duration (minutes)</label>
        <input type="number" id="task-estimate" min="1" max="480" />
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btn-cancel-task">
          Cancel
        </button>
        <button type="submit" class="btn btn-accent">Save Task</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-overlay" id="edit-task-modal-overlay" style="display: none">
  <div class="modal glass" id="modal-edit-task">
    <div class="modal-header">
      <h2>Edit Task</h2>
      <button class="btn btn-ghost btn-sm" id="btn-edit-task-close">✕</button>
    </div>
    <form id="form-edit-task">
      <input type="hidden" id="edit-task-id" />
      <input type="hidden" id="edit-task-is-manual" />
      <div class="form-group">
        <label for="edit-task-name">Task Name</label>
        <input type="text" id="edit-task-name" required />
        <small
          id="edit-task-calendar-notice"
          style="
            display: none;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 4px;
          "
          >Calendar task: Name, date, and time are sync'd from GNOME
          Calendar.</small
        >
      </div>
      <div class="form-row" id="edit-task-time-row">
        <div class="form-group">
          <label for="edit-task-date">Date</label>
          <input type="date" id="edit-task-date" required />
        </div>
        <div class="form-group">
          <label for="edit-task-time">Time</label>
          <input type="time" id="edit-task-time" required />
        </div>
      </div>
      <div class="form-group">
        <label for="edit-task-estimate">Estimated Duration (minutes)</label>
        <input type="number" id="edit-task-estimate" min="1" max="480" />
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btn-edit-task-cancel">
          Cancel
        </button>
        <button type="submit" class="btn btn-accent">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<!-- Estimate Modal -->
<div class="modal-overlay" id="estimate-modal-overlay" style="display: none">
  <div class="modal glass modal-sm" id="modal-estimate">
    <div class="modal-header">
      <h2>Set Estimate</h2>
      <button class="btn btn-ghost btn-sm" id="btn-estimate-close">✕</button>
    </div>
    <form id="form-estimate">
      <input type="hidden" id="estimate-task-id" />
      <div class="form-group">
        <label for="estimate-minutes">Estimated time (minutes)</label>
        <input type="number" id="estimate-minutes" min="1" max="480" required />
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btn-estimate-cancel">
          Cancel
        </button>
        <button type="submit" class="btn btn-accent">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="project-modal-overlay" style="display: none">
  <div class="modal glass modal-sm" id="modal-project">
    <div class="modal-header">
      <h2 id="project-modal-title">Create Project</h2>
      <button class="btn btn-ghost btn-sm" id="btn-project-close">✕</button>
    </div>
    <form id="form-project">
      <input type="hidden" id="project-id" />
      <div class="form-group">
        <label for="project-name">Project Name</label>
        <input type="text" id="project-name" required />
      </div>

      <div class="form-group">
        <label>Accent Color</label>
        <div class="color-picker-grid">
          <label class="color-picker-option" style="--option-color: #38bdf8">
            <input type="radio" name="project-color" value="#38bdf8" checked />
            <span></span>
          </label>
          <label class="color-picker-option" style="--option-color: #4ecdc4">
            <input type="radio" name="project-color" value="#4ecdc4" />
            <span></span>
          </label>
          <label class="color-picker-option" style="--option-color: #ff6b8a">
            <input type="radio" name="project-color" value="#ff6b8a" />
            <span></span>
          </label>
          <label class="color-picker-option" style="--option-color: #f9a826">
            <input type="radio" name="project-color" value="#f9a826" />
            <span></span>
          </label>
          <label class="color-picker-option" style="--option-color: #56d67b">
            <input type="radio" name="project-color" value="#56d67b" />
            <span></span>
          </label>
          <label class="color-picker-option" style="--option-color: #62a0ea">
            <input type="radio" name="project-color" value="#62a0ea" />
            <span></span>
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btn-project-cancel">
          Cancel
        </button>
        <button type="submit" class="btn btn-accent">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Create/Edit Habit Modal -->
<div class="modal-overlay" id="habit-modal-overlay" style="display: none">
  <div class="modal glass modal-sm" id="modal-habit">
    <div class="modal-header">
      <h2 id="habit-modal-title">Create Habit</h2>
      <button class="btn btn-ghost btn-sm" id="btn-habit-close">✕</button>
    </div>
    <form id="form-habit">
      <input type="hidden" id="habit-id" />
      <div class="form-group">
        <label for="habit-name">Habit Name</label>
        <input type="text" id="habit-name" required />
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btn-habit-cancel">
          Cancel
        </button>
        <button type="submit" class="btn btn-accent">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Fullscreen Timer Overlay -->
<div
  class="fullscreen-timer-overlay"
  id="fullscreen-timer-overlay"
  style="display: none"
>
  <button
    class="fullscreen-close-btn"
    id="btn-fullscreen-close"
    title="Exit Fullscreen"
  >
    ✕
  </button>
  <div class="fullscreen-timer-content">
    <div class="fullscreen-task-name" id="fullscreen-task-name">
      No task selected
    </div>
    <div class="fullscreen-timer-display" id="fullscreen-timer-display">
      00:00:00
    </div>
    <div class="fullscreen-timer-hint">Press ESC to exit fullscreen</div>
  </div>
</div>

<!-- Global Target Modal -->
<div
  class="modal-overlay"
  id="global-target-modal-overlay"
  style="display: none"
>
  <div class="modal glass modal-sm">
    <div class="modal-header">
      <h2>Set Overall Weekly Target</h2>
      <button class="btn btn-ghost btn-sm" id="btn-global-target-close">
        ✕
      </button>
    </div>
    <form id="form-global-target">
      <div class="form-group">
        <label for="global-target-hours">Weekly Target Hours</label>
        <input
          type="number"
          id="global-target-hours"
          min="0"
          max="168"
          step="0.5"
        />
      </div>
      <div class="form-actions" style="justify-content: space-between">
        <button
          type="button"
          class="btn btn-ghost btn-reset"
          id="btn-global-target-delete"
          style="
            color: var(--accent-pink);
            border-color: rgba(255, 107, 138, 0.2);
          "
        >
          Delete Target
        </button>
        <div style="display: flex; gap: var(--space-sm)">
          <button
            type="button"
            class="btn btn-ghost"
            id="btn-global-target-cancel"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-accent">Save Target</button>
        </div>
      </div>
    </form>
  </div>
</div>
