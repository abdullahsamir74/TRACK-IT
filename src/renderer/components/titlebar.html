<header id="titlebar">
  <div class="titlebar-drag">
    <div class="titlebar-icon">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </div>
    <span class="titlebar-title">TRACK IT</span>
  </div>
  <div class="titlebar-controls">
    <button id="btn-minimize" class="titlebar-btn" title="Minimize">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <rect y="5" width="12" height="2" rx="1" fill="currentColor" />
      </svg>
    </button>
    <button id="btn-maximize" class="titlebar-btn" title="Maximize">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <rect
          x="1"
          y="1"
          width="10"
          height="10"
          rx="2"
          stroke="currentColor"
          stroke-width="1.5"
          fill="none"
        />
      </svg>
    </button>
    <button id="btn-close" class="titlebar-btn btn-close" title="Close">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <line
          x1="2"
          y1="2"
          x2="10"
          y2="10"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <line
          x1="10"
          y1="2"
          x2="2"
          y2="10"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>
</header>
