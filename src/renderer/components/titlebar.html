<header id="titlebar">
  <div class="titlebar-drag">
    <div class="titlebar-icon">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </div>
    <span class="titlebar-title">TRACK IT</span>
  </div>
  <div class="titlebar-controls">
    <button id="btn-theme-toggle" class="titlebar-btn theme-toggle-btn" title="Toggle Day/Night Theme">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <button id="btn-minimize" class="titlebar-btn" title="Minimize">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <rect y="5" width="12" height="2" rx="1" fill="currentColor" />
      </svg>
    </button>
    <button id="btn-maximize" class="titlebar-btn" title="Maximize">
      <svg class="icon-maximize" width="12" height="12" viewBox="0 0 12 12">
        <rect
          x="1"
          y="1"
          width="10"
          height="10"
          rx="2"
          stroke="currentColor"
          stroke-width="1.5"
          fill="none"
        />
      </svg>
      <svg class="icon-restore" width="12" height="12" viewBox="0 0 12 12" style="display: none;">
        <path
          d="M3.5 1.5H9.5C10.05 1.5 10.5 1.95 10.5 2.5V8.5"
          stroke="currentColor"
          stroke-width="1.5"
          fill="none"
          stroke-linecap="round"
        />
        <rect
          x="1.5"
          y="3.5"
          width="7"
          height="7"
          rx="1.5"
          stroke="currentColor"
          stroke-width="1.5"
          fill="none"
        />
      </svg>
    </button>
    <button id="btn-close" class="titlebar-btn btn-close" title="Close">
      <svg width="12" height="12" viewBox="0 0 12 12">
        <line
          x1="2"
          y1="2"
          x2="10"
          y2="10"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <line
          x1="10"
          y1="2"
          x2="2"
          y2="10"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>
</header>
